name: release

on:
  push:
    tags: ['v*.*.*']

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache: true

      - name: Build (linux/amd64)
        run: |
          mkdir -p dist
          GOOS=linux  GOARCH=amd64 go build -o dist/dig-linux-amd64   .
          GOOS=linux  GOARCH=arm64 go build -o dist/dig-linux-arm64   .
          GOOS=darwin GOARCH=amd64 go build -o dist/dig-darwin-amd64  .
          GOOS=darwin GOARCH=arm64 go build -o dist/dig-darwin-arm64  .
          GOOS=windows GOARCH=amd64 go build -o dist/dig-windows-amd64.exe .

      - name: Checksums
        run: |
          cd dist
          sha256sum dig-* > SHA256SUMS

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/dig-linux-amd64
            dist/dig-linux-arm64
            dist/dig-darwin-amd64
            dist/dig-darwin-arm64
            dist/dig-windows-amd64.exe
            dist/SHA256SUMS
          generate_release_notes: true